<style>
:root{--ivory:#FBF8F2;--paper:#FFFFFF;--ink:#3A322C;--soft:#7A6F66;--blush:#C49A92;--blush-tint:#F4E7E2;--sage:#8E9A82;--sage-tint:#E8ECE2;--line:#E8DFD2;--gold:#B79A6B;--gold-tint:#F3EEE4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--ivory);color:var(--ink);font-family:"Mulish",-apple-system,system-ui,sans-serif;font-size:15px;line-height:1.5;padding-bottom:calc(74px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}
.serif{font-family:"GFS Didot","Hoefler Text",Georgia,serif;}
em{color:var(--blush);font-style:italic;}
.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--blush);font-weight:700;}
header{position:sticky;top:0;z-index:20;background:rgba(251,248,242,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 14px) 20px 12px;}
.brand{display:flex;align-items:baseline;gap:9px;}
.brand .mark{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--blush);font-weight:700;}
.brand .stitle{font-family:"GFS Didot",Georgia,serif;font-size:24px;line-height:1;}
main{padding:18px 20px 24px;max-width:560px;margin:0 auto;}
.view{display:none;animation:fade .25s ease;}
.view.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.sec-head{margin:4px 0 16px;}
.sec-head h2{font-family:"GFS Didot",Georgia,serif;font-weight:400;font-size:30px;line-height:1.1;margin:6px 0 0;}
.sec-head p{color:var(--soft);font-size:14px;margin:8px 0 0;}
.divider{height:1px;background:var(--line);margin:22px 0;position:relative;}
.divider::after{content:"\2726";color:var(--blush);position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--ivory);padding:0 10px;font-size:11px;}
.block{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:17px 18px;margin-bottom:14px;}
.block>.eyebrow{display:block;margin-bottom:12px;}
.pill{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:999px;}
.pill.ontbijt{background:var(--gold-tint);color:#9a824f;}
.pill.lunch{background:var(--sage-tint);color:#5d6a51;}
.pill.avond{background:var(--blush-tint);color:#a06b61;}
.pill.kind{background:#F3EEE4;color:var(--gold);}
.daynav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}

function getISOWeek(d){
  var date=new Date(d); date.setHours(0,0,0,0);
  date.setDate(date.getDate()+4-(date.getDay()||7));
  var yearStart=new Date(date.getFullYear(),0,1);
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}
function weekKey(offset){
  var d=new Date(); d.setDate(d.getDate()+(offset||0)*7);
  var y=d.getFullYear(); var w=getISOWeek(d);
  return y+"-W"+(w<10?"0":"")+w;
}

function getAutoPhase(){
  if(!cycleData.startDate) return null;
  var start=new Date(cycleData.startDate);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.round((today-start)/(1000*60*60*24));
  var cLen=cycleData.cycleLen||28;
  var dayInCycle=((diff%cLen)+cLen)%cLen+1;
  var pLen=cycleData.periodLen||5;
  if(dayInCycle<=pLen) return "menstruatie";
  if(dayInCycle<=Math.round(cLen*0.46)) return "folliculair";
  if(dayInCycle<=Math.round(cLen*0.57)) return "ovulatie";
  return "luteaal";
}
function getCurrentPhase(){return cycleData.manualPhase||getAutoPhase();}
function getDayInCycle(){
  if(!cycleData.startDate) return null;
  var start=new Date(cycleData.startDate);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.round((today-start)/(1000*60*60*24));
  var cLen=cycleData.cycleLen||28;
  return ((diff%cLen)+cLen)%cLen+1;
}

// ── EDITOR ──
function ingToText(ing){
  return (ing||[]).map(function(x){return (x.a!=null?x.a+(x.u?' '+x.u:'')+" ":"")+x.it;}).join("\n");
}
function parseIng(line){
  line=line.trim();if(!line)return null;
  var m=line.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-Z]+)?\s+(.+)$/);
  var units=["g","kg","ml","l","el","tl","tsp","tbsp","cup","stuks","blik","blikken","teen","tenen","bol"];
  if(m){
    var a=parseFloat(m[1].replace(",",".")),u="",it;
    if(m[2]&&units.indexOf(m[2].toLowerCase())>=0){u=m[2].toLowerCase();it=m[3];}
    else{it=(m[2]?m[2]+" ":"")+m[3];}
    return {a:a,u:u,it:it};
  }
  return {a:null,u:"",it:line};
}

    +'<option value="lunch"'+(r.meal==="lunch"?" selected":"")+'>Lunch</option>'
    +'<option value="avond"'+(r.meal==="avond"?" selected":"")+'>Avond</option>'
    +'<option value="hapje"'+(r.meal==="hapje"?" selected":"")+'>Hapje</option>'
    +'</select></div>'
    +'<div class="field"><label>Label (optioneel)</label><input id="eTag" value="'+esc(r.tag||'')+'" placeholder="bv. oven \u00b7 batch"></div>'
    +'<div class="field"><label>Porties (basis)</label><input id="eBase" type="number" min="1" value="'+(r.base||2)+'"></div>'
    +'<div class="field"><label>Ingredi\u00ebnten &mdash; \u00e9\u00e9n per regel</label>'
    +'<textarea id="eIng" placeholder="200 g pasta\n1 burrata\nbasilicum, peper">'+esc(ingToText(r.ing))+'</textarea>'
    +'<div class="hint">Begin met hoeveelheid + eenheid (g, ml, el...) als je porties wil laten meeschalen.</div></div>'
    +'<div class="field"><label>Stappen &mdash; \u00e9\u00e9n per regel</label>'

    +'<div class="field"><label>Tip (optioneel)</label><input id="eTip" value="'+esc(r.tip||'')+'"></div>'
    +'<div class="field"><label>Labels</label><div class="label-edit-row" id="eLblRow">'+lblHtml+'</div></div>'

    +'</div>';
  document.getElementById("sheetContent").innerHTML=h;

function saveRecipe(id){
  var lblNodes=document.querySelectorAll("#eLblRow .lbl-tog.on");
  var lblArr=[];
  lblNodes.forEach(function(el){
    var found=ALL_LABELS.find(function(x){return x[1]===el.textContent;});
    if(found) lblArr.push(found[0]);
  });
  var obj={
    title:document.getElementById("eTitle").value.trim()||"Naamloos recept",
    meal:document.getElementById("eMeal").value,
    tag:document.getElementById("eTag").value.trim(),
    base:Math.max(1,parseInt(document.getElementById("eBase").value)||2),
    ing:document.getElementById("eIng").value.split("\n").map(parseIng).filter(Boolean),
    steps:document.getElementById("eSteps").value.split("\n").map(function(s){return s.trim();}).filter(Boolean),
    tip:document.getElementById("eTip").value.trim(),
  };
  if(id){
    var isCustom=custom.find(function(x){return x.id===id;});
    if(isCustom){Object.assign(isCustom,obj);save("fp_custom",custom);if(meta[id])delete meta[id].ov;}
    else{var m=meta[id]||(meta[id]={});m.ov=obj;}
    var m2=meta[id]||(meta[id]={});m2.extraLabels=lblArr;
    save("fp_meta",meta);drawDetail(id);
  } else {
    var nid="C"+Date.now();
    custom.push(Object.assign({id:nid},obj));
    var nm=meta[nid]||(meta[nid]={});nm.extraLabels=lblArr;
    save("fp_custom",custom);save("fp_meta",meta);
    closeSheet();renderRecepten();
  }
}

function doImport(){
  var raw=document.getElementById("impText").value.trim();
  try{
    var arr=JSON.parse(raw);
    if(!Array.isArray(arr)) arr=[arr];
    var n=0;
    arr.forEach(function(r,i){
      if(!r.title)return;
      custom.push({id:"C"+Date.now()+"_"+i,meal:r.meal||"avond",title:r.title,tag:r.tag||"",
        base:r.base||2,ing:(r.ing||[]).map(function(x){return{a:x.a!=null?x.a:null,u:x.u||"",it:x.it||x.item||""};;}),
        steps:r.steps||[],tip:r.tip||"",yield:r.yield||"",keeps:r.keeps||"",time:r.time||""});
      if(r.labels){var m=meta["C"+Date.now()+"_"+i]||(meta["C"+Date.now()+"_"+i]={});m.extraLabels=r.labels;}
      n++;
    });
    save("fp_custom",custom);closeSheet();renderRecepten();
    alert(n+" recept"+(n===1?"":"en")+" toegevoegd.");
  }catch(e){alert("Hmm, dat lukte niet. Controleer of je de volledige code plakte.");}
}
function backup(){
  var data=JSON.stringify({allPlans:allPlans,custom:custom,meta:meta,jims:jimsClasses});
  copyText(data,"Backup gekopieerd! Bewaar \u2019m in Notes.");
}
function copyText(t,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){alert(msg);}).catch(function(){fallbackCopy(t,msg);});}
  else fallbackCopy(t,msg);
}
function fallbackCopy(t,msg){var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");alert(msg);}catch(e){prompt("Kopieer handmatig:",t);}document.body.removeChild(ta);}

// ── LIJST ──
function buildList(){
  var map={},staples={};
  activePlan().meals.forEach(function(day){
    MEALS.forEach(function(m){
      var id=day[m];
      if(!id||id==="nvt")return;
      var r=recipeById(id);if(!r)return;
      (r.ing||[]).forEach(function(x){
        if(x.a==null){staples[x.it.toLowerCase()]=x.it;return;}
        var k=x.it.toLowerCase()+"|"+x.u;
        if(!map[k])map[k]={it:x.it,u:x.u,a:0,lo:false};
        map[k].a+=x.a;
        if(leftovers[x.it.toLowerCase()])map[k].lo=true;
      });
    });
  });
  var toBuy=Object.values(map).map(function(o){
    var a=(o.u==="g"||o.u==="ml")?(o.a>=20?Math.round(o.a/5)*5:Math.round(o.a)):Math.round(o.a*10)/10;
    return {txt:o.it,amt:a,unit:o.u,lo:o.lo||false};
  });
  toBuy.sort(function(a,b){return a.txt.localeCompare(b.txt);});
  return {toBuy:toBuy,staples:Object.values(staples).sort()};
}
function renderLijst(){
  var L=buildList();
  var h='<div class="sec-head"><span class="eyebrow">Boodschappen</span><h2 class="serif">Je <em>lijst</em></h2><p>Automatisch uit je weekplan.</p></div>'
    +'<div class="installhint"><span>&#10022;</span><div><b>Zet me op je beginscherm</b> &mdash; deel-icoon &rarr; &ldquo;Zet op beginscherm&rdquo;. De app opent dan offline.</div></div>';
  if(!L.toBuy.length&&!L.staples.length){
    h+='<div class="empty"><div class="big">&#10022;</div><p>Nog niets om te kopen.<br>Stel eerst je <b>week</b> samen.</p></div>'
      +'<button class="btn ghost" onclick="go(\'week\')">Naar de week &#8250;</button>';
    document.getElementById("v-lijst").innerHTML=h;return;
  }
  var all=L.toBuy.length+L.staples.length,done=0;
  L.toBuy.forEach(function(o){if(listChecks["b|"+o.txt])done++;});
  L.staples.forEach(function(s){if(listChecks["s|"+s])done++;});
  var pct=all?Math.round(done/all*100):0;
  h+='<button class="btn" onclick="copyList()">Lijst kopi\u00ebren om te delen</button>'
    +'<div class="progress">'+done+' van '+all+' &middot; '+pct+'%</div>'
    +'<div class="pbar"><i id="pbarI" style="width:'+pct+'%"></i></div>';
  L.toBuy.forEach(function(o){
    var key="b|"+o.txt,d=listChecks[key]?"done":"",loTag=o.lo?'<span class="leftover-tag">al in huis</span>':'';
    var amt='<span class="amt">'+((""+o.amt).replace(".",","))+(o.unit?" "+o.unit:"")+'</span>';
    h+='<div class="shoprow '+d+'" onclick="toggleL(this,\''+esc(key).replace(/'/g,"\\'")+'\')">'
      +'<div class="tick">'+checkSvg+'</div>'+amt+'<div class="txt">'+esc(o.txt)+'</div></div>';
  });
  if(L.staples.length){
    h+='<div class="subhead">Check je voorraad</div>';
    L.staples.forEach(function(s){
      var key="s|"+s,d=listChecks[key]?"done":"";
      h+='<div class="shoprow '+d+'" onclick="toggleL(this,\''+esc(key).replace(/'/g,"\\'")+'\')">'
        +'<div class="tick">'+checkSvg+'</div><span class="amt"></span><div class="txt">'+esc(s)+'</div></div>';
    });
  }
  h+='<button class="btn subtle" style="margin-top:16px" onclick="resetL()">Vinkjes wissen</button>';
  document.getElementById("v-lijst").innerHTML=h;
}
function updListBar(){
  var L=buildList(),all=L.toBuy.length+L.staples.length,done=0;
  L.toBuy.forEach(function(o){if(listChecks["b|"+o.txt])done++;});
  L.staples.forEach(function(s){if(listChecks["s|"+s])done++;});
  var pct=all?Math.round(done/all*100):0;
  var pr=document.querySelector("#v-lijst .progress");
  var bar=document.getElementById("pbarI");
  if(pr)pr.innerHTML=done+" van "+all+" &middot; "+pct+"%";
  if(bar)bar.style.width=pct+"%";
}
function toggleL(el,key){
  el.classList.toggle("done");
  listChecks[key]=el.classList.contains("done");
  if(!listChecks[key])delete listChecks[key];
  save("fp_list",listChecks);updListBar();
}
function resetL(){listChecks={};save("fp_list",listChecks);renderLijst();}
function copyList(){
  var L=buildList(),t="Boodschappen\n\n";
  L.toBuy.forEach(function(o){t+="- "+((""+o.amt).replace(".",","))+(o.unit?" "+o.unit:"")+" "+o.txt+"\n";});
  if(L.staples.length){t+="\nCheck voorraad:\n";L.staples.forEach(function(s){t+="- "+s+"\n";});}
  copyText(t,"Lijst gekopieerd! Plak \u2019m in Notes, Bring of WhatsApp.");
}

function openSheet(){document.getElementById("sheet").classList.add("on");document.body.style.overflow="hidden";}
function closeSheet(){document.getElementById("sheet").classList.remove("on");document.body.style.overflow="";}
var TABS={vandaag:{t:"Plan"},week:{t:"Week"},recepten:{t:"Recepten"},lijst:{t:"Boodschappen"}};
function go(tab){
  if(tab==="vandaag")renderVandaag();
  if(tab==="week")renderWeek();
  if(tab==="recepten")renderRecepten();
  if(tab==="lijst")renderLijst();
  document.querySelectorAll(".view").forEach(function(v){v.classList.remove("on");});
  document.getElementById("v-"+tab).classList.add("on");
  document.querySelectorAll("nav button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab);});
  document.getElementById("htitle").textContent=TABS[tab].t;
  window.scrollTo(0,0);
}
