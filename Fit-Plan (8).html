/* ═══════════════════════════════════════
   FIT PLAN — SWISS / SCANDINAVIAN EDITION
   Zero shadow. Zero gradient. Zero radius.
   Four colors. Type as decoration.
   ═══════════════════════════════════════ */

:root {
  --bone:     #EDE8DE;
  --alabaster:#F6F2EA;
  --espresso: #2A2420;
  --ochre:    #B8893E;
  --hairline: #D5CEC2;
  --soft:     #8C8278;
  --faint:    #C8C0B4;
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html, body { margin:0; padding:0; }

body {
  background: var(--bone);
  color: var(--espresso);
  font-family: "Jost", -apple-system, system-ui, sans-serif;
  font-size: 15px;
  font-weight: 400;
  line-height: 1.5;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
  letter-spacing: .01em;
}

/* ── GLOBAL TYPE SCALE ── */
.label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--soft);
}
.serif { font-family: "Jost", sans-serif; } /* override — no serif in Swiss */
em { font-style: italic; color: var(--ochre); }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 20;
  background: var(--bone);
  border-bottom: 1px solid var(--hairline);
  padding: calc(env(safe-area-inset-top) + 16px) 24px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand .mark {
  font-size: 9px; letter-spacing: .5em; text-transform: uppercase;
  color: var(--ochre); font-weight: 700;
}
.brand .stitle {
  font-size: 17px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase;
}

/* ── VIEWS ── */
main { padding: 0; max-width: 560px; margin: 0 auto; }
.view { display: none; }
.view.on { display: block; }

/* ── DAY HEADER (Vandaag) ── */
.day-header {
  padding: 36px 24px 28px;
  border-bottom: 1px solid var(--hairline);
}
.day-header .day-nav {
  display: flex; align-items: flex-start;
  justify-content: space-between;
}
.day-center { flex: 1; }
.day-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: .45em;
  text-transform: uppercase; color: var(--ochre); margin-bottom: 8px;
}
.day-name {
  font-size: 44px; font-weight: 300; line-height: 1;
  letter-spacing: -.02em;
}
.day-date { font-size: 13px; color: var(--soft); margin-top: 6px; letter-spacing: .04em; }
.arrow {
  width: 36px; height: 36px;
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--espresso); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 8px;
}
.arrow:active { background: var(--espresso); color: var(--bone); }

/* ── MEAL ROWS ── */
.meal-row {
  display: flex; align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  background: var(--bone);
  transition: background .1s;
}
.meal-row:active { background: var(--alabaster); }
.meal-row .m-type {
  font-size: 9px; font-weight: 700; letter-spacing: .35em;
  text-transform: uppercase; color: var(--soft);
  width: 68px; flex: 0 0 auto;
}
.meal-row .m-title {
  flex: 1; font-size: 16px; font-weight: 400; line-height: 1.3;
}
.meal-row .m-title.empty {
  color: var(--faint); font-style: italic; font-size: 14px;
}
.meal-row .m-arrow { color: var(--faint); font-size: 16px; margin-left: 12px; }
.meal-row .m-emoji { font-size: 16px; margin-right: 14px; opacity: .7; }

/* ── SECTION LABEL ── */
.section-label {
  padding: 24px 24px 8px;
  font-size: 9px; font-weight: 700; letter-spacing: .45em;
  text-transform: uppercase; color: var(--soft);
  border-bottom: 1px solid var(--hairline);
}

/* ── TRACKING BARS ── */
.tracker-block {
  padding: 20px 24px;
  border-bottom: 1px solid var(--hairline);
}
.tracker-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.tracker-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: .35em;
  text-transform: uppercase; color: var(--soft);
}
.tracker-val { font-size: 13px; font-weight: 500; color: var(--espresso); }
.track-bar {
  height: 2px; background: var(--hairline);
  position: relative; margin-bottom: 16px;
}
.track-bar:last-child { margin-bottom: 0; }
.track-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--ochre);
  transition: width .3s;
}
.tracker-controls {
  display: flex; align-items: center; gap: 0;
  margin-top: 14px;
}
.track-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--hairline);
  background: transparent; color: var(--espresso);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.track-btn:active { background: var(--espresso); color: var(--bone); }
.track-count {
  flex: 1; text-align: center;
  font-size: 28px; font-weight: 300; letter-spacing: -.02em;
}
.track-unit {
  font-size: 11px; color: var(--soft); letter-spacing: .08em;
  display: block; margin-top: 2px;
}

/* ── ENERGY ROW ── */
.energy-block {
  padding: 20px 24px;
  border-bottom: 1px solid var(--hairline);
}
.energy-opts {
  display: flex; gap: 0; margin-top: 12px;
}
.energy-btn {
  flex: 1; padding: 10px 8px;
  border: 1px solid var(--hairline);
  border-right: none;
  background: transparent; color: var(--soft);
  font-family: inherit; font-size: 11px;
  font-weight: 600; letter-spacing: .2em;
  text-transform: uppercase;
  cursor: pointer;
}
.energy-btn:last-child { border-right: 1px solid var(--hairline); }
.energy-btn.on { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }
.daynote-text {
  width: 100%; border: none; border-top: 1px solid var(--hairline);
  padding: 14px 0 0; margin-top: 14px;
  font-family: inherit; font-size: 14px;
  resize: none; outline: none;
  min-height: 40px; line-height: 1.5;
  background: transparent; color: var(--espresso);
}

/* ── CYCLE BAR ── */
.cycle-row {
  padding: 16px 24px;
  border-bottom: 1px solid var(--hairline);
  display: flex; align-items: center;
  justify-content: space-between; cursor: pointer;
}
.cycle-row:active { background: var(--alabaster); }
.cycle-phase {
  font-size: 9px; font-weight: 700; letter-spacing: .4em;
  text-transform: uppercase; color: var(--ochre);
}
.cycle-day {
  font-size: 13px; color: var(--soft);
}
.cycle-tip { font-size: 13px; color: var(--soft); margin-top: 2px; }

/* ── MOVE ROW ── */
.move-row {
  padding: 18px 24px;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer; background: var(--alabaster);
  display: flex; align-items: center; gap: 0;
}
.move-row:active { background: var(--hairline); }
.move-type {
  font-size: 9px; font-weight: 700; letter-spacing: .35em;
  text-transform: uppercase; color: var(--soft); width: 68px;
}
.move-name { flex: 1; font-size: 16px; font-weight: 400; }
.move-done { font-size: 13px; color: var(--ochre); margin-left: 12px; letter-spacing: .05em; }
.rest-row {
  padding: 20px 24px;
  border-bottom: 1px solid var(--hairline);
  font-size: 13px; color: var(--faint);
  font-style: italic; letter-spacing: .04em;
}

/* ── PLAN BUTTON ── */
.plan-btn-row {
  padding: 20px 24px;
  border-bottom: 1px solid var(--hairline);
}

/* ── WORKOUT DONE BADGES ── */
.wd-row {
  padding: 12px 24px;
  border-bottom: 1px solid var(--hairline);
  display: flex; gap: 0;
}
.wdbtn {
  flex: 1; padding: 10px;
  border: 1px solid var(--hairline); border-right: none;
  background: transparent; color: var(--soft);
  font-family: inherit; font-size: 11px;
  font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
  cursor: pointer;
}
.wdbtn:last-child { border-right: 1px solid var(--hairline); }
.wdbtn.on { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }

/* ── WEEK SWITCHER ── */
.week-switcher {
  display: flex; border-bottom: 1px solid var(--hairline);
  background: var(--bone);
}
.wstab {
  flex: 1; padding: 14px 24px;
  border: none; border-right: 1px solid var(--hairline);
  background: transparent; color: var(--soft);
  font-family: inherit; font-size: 11px;
  font-weight: 600; letter-spacing: .25em; text-transform: uppercase;
  cursor: pointer;
}
.wstab:last-child { border-right: none; }
.wstab.active { background: var(--espresso); color: var(--bone); }

/* ── WEEK GRID ── */
.sec-head { padding: 32px 24px 0; }
.sec-head h2 {
  font-size: 42px; font-weight: 300; line-height: 1;
  letter-spacing: -.02em;
}
.sec-head h2 em { color: var(--ochre); font-style: italic; }
.sec-head p { font-size: 13.5px; color: var(--soft); margin-top: 8px; line-height: 1.5; }
.sec-head .eyebrow {
  display: block; font-size: 9px; font-weight: 700;
  letter-spacing: .4em; text-transform: uppercase;
  color: var(--ochre); margin-bottom: 10px;
}
.slothead {
  display: grid; grid-template-columns: 40px 1fr 1fr 1fr;
  gap: 1px; padding: 16px 24px 8px;
}
.slothead div {
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  font-weight: 600; color: var(--soft); text-align: center;
}
.slothead div:first-child { text-align: left; }
.week-grid { padding: 0 24px; }
.dayrow {
  display: grid; grid-template-columns: 40px 1fr 1fr 1fr;
  gap: 1px; margin-bottom: 1px;
}
.dayrow .dl {
  display: flex; align-items: center;
  font-size: 12px; font-weight: 600; color: var(--soft);
  letter-spacing: .08em; text-transform: uppercase;
}
.dayrow.today .dl { color: var(--ochre); }
.slot {
  background: var(--alabaster);
  padding: 10px 8px; font-size: 11px;
  min-height: 48px; display: flex; align-items: center;
  justify-content: center; text-align: center;
  cursor: pointer; line-height: 1.3;
  border: none; transition: background .1s;
}
.slot:active { background: var(--hairline); }
.slot.set { background: var(--espresso); color: var(--alabaster); font-weight: 500; font-size: 10.5px; }
.slot.nvt { color: var(--faint); font-style: italic; }
.slot.empty { color: var(--faint); font-size: 18px; font-weight: 300; }

/* ── DAYCHIPS ── */
.daychips { display: flex; gap: 1px; margin-top: 12px; }
.daychip {
  flex: 1; border: 1px solid var(--hairline); border-right: none;
  background: transparent; color: var(--soft);
  padding: 9px 0; font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; text-align: center;
}
.daychip:last-child { border-right: 1px solid var(--hairline); }
.daychip.active { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }

/* ── BLOCK ── */
.block {
  border-top: 1px solid var(--hairline);
  padding: 24px;
  background: var(--bone);
}
.block .eyebrow {
  display: block; font-size: 9px; font-weight: 700;
  letter-spacing: .4em; text-transform: uppercase;
  color: var(--ochre); margin-bottom: 14px;
}

/* ── CLASS PICK ── */
.classpick {
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid var(--hairline); padding: 14px 16px;
  margin-top: 12px; cursor: pointer;
}
.classpick .cv { font-weight: 500; }
.classpick .cv.muted { color: var(--soft); font-style: italic; font-weight: 400; }
.chev { color: var(--faint); }

/* ── DIVIDER ── */
.divider {
  height: 1px; background: var(--hairline);
  margin: 0; position: relative;
}

/* ── SHEET ── */
.sheet {
  position: fixed; inset: 0; z-index: 50;
  background: var(--bone); overflow-y: auto;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  -webkit-overflow-scrolling: touch;
}
.sheet.on { transform: none; }
.sheet-head {
  position: sticky; top: 0;
  background: var(--bone);
  border-bottom: 1px solid var(--hairline);
  padding: calc(env(safe-area-inset-top) + 14px) 24px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.backbtn {
  background: none; border: none;
  font-size: 13px; color: var(--ochre);
  font-weight: 700; cursor: pointer;
  letter-spacing: .2em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.sheet-body { padding: 32px 24px 90px; max-width: 560px; margin: 0 auto; }
.sheet-body .eyebrow {
  display: block; font-size: 9px; font-weight: 700;
  letter-spacing: .45em; text-transform: uppercase;
  color: var(--ochre); margin-bottom: 14px;
}
.sheet-body h1 {
  font-size: 38px; font-weight: 300; line-height: 1.05;
  letter-spacing: -.02em; margin: 0 0 6px;
}
.sheet-body .metaline { font-size: 13px; color: var(--soft); margin-bottom: 28px; letter-spacing: .04em; }

/* ── SERVINGS ── */
.servings {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  padding: 16px 0; margin-bottom: 28px;
}
.servings .lbl { font-weight: 600; font-size: 14px; }
.servings .lbl span { display: block; font-weight: 400; font-size: 12px; color: var(--soft); margin-top: 2px; }
.stepper { display: flex; align-items: center; gap: 16px; }
.stepper button {
  width: 36px; height: 36px;
  border: 1px solid var(--hairline);
  background: transparent; color: var(--espresso);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.stepper button:active { background: var(--espresso); color: var(--bone); }
.stepper .val { font-size: 26px; font-weight: 300; min-width: 28px; text-align: center; }

/* ── SUBHEAD ── */
.subhead {
  font-size: 9px; font-weight: 700; letter-spacing: .4em;
  text-transform: uppercase; color: var(--ochre);
  margin: 28px 0 14px;
}

/* ── INGREDIENT ROWS ── */
.ingrow {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid var(--hairline);
  cursor: pointer;
}
.ingrow:last-of-type { border-bottom: none; }
.tick {
  width: 18px; height: 18px;
  border: 1px solid var(--hairline);
  flex: 0 0 auto; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
}
.ingrow.done .tick, .shoprow.done .tick { background: var(--espresso); border-color: var(--espresso); }
.tick svg { opacity: 0; }
.ingrow.done .tick svg, .shoprow.done .tick svg { opacity: 1; }
.ingrow .amt { font-weight: 600; min-width: 64px; font-variant-numeric: tabular-nums; }
.ingrow.done .txt, .shoprow.done .txt { text-decoration: line-through; color: var(--faint); }

/* ── STEPS ── */
.steplist { counter-reset: s; list-style: none; padding: 0; }
.steplist li {
  counter-increment: s;
  position: relative; padding: 0 0 18px 44px;
  font-size: 15px; line-height: 1.6;
}
.steplist li::before {
  content: counter(s, decimal-leading-zero);
  position: absolute; left: 0; top: 0;
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; color: var(--ochre);
  padding-top: 4px;
}
.steplist li:last-child { padding-bottom: 0; }

/* ── TIP BOX ── */
.tipbox {
  border-left: 2px solid var(--ochre);
  padding: 12px 16px;
  font-size: 13.5px; color: var(--soft);
  margin-top: 20px; line-height: 1.55;
  background: var(--alabaster);
}
.tipbox b { color: var(--espresso); }

/* ── ACTION ROW ── */
.actionrow { display: flex; gap: 1px; margin: 24px 0 6px; }
.actionrow button {
  flex: 1; border: 1px solid var(--hairline); border-right: none;
  background: transparent; color: var(--espresso);
  padding: 13px 8px; font-family: inherit;
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
}
.actionrow button:last-child { border-right: 1px solid var(--hairline); }
.actionrow button.on { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }
.actionrow button.danger { color: #9B3A2A; }
.note {
  width: 100%; border: 1px solid var(--hairline);
  padding: 14px; font-family: inherit; font-size: 14px;
  resize: vertical; min-height: 80px; outline: none;
  background: transparent; color: var(--espresso);
  margin-top: 14px;
}
.note:focus { border-color: var(--espresso); }
.noteshown {
  border-left: 2px solid var(--ochre);
  padding: 12px 16px; font-size: 13.5px; margin-top: 14px;
  background: var(--alabaster);
}
.noteshown .nl {
  font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--ochre); font-weight: 700; margin-bottom: 5px; display: block;
}

/* ── LABEL EDITOR ── */
.label-edit-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.lbl-tog {
  border: 1px solid var(--hairline); padding: 8px 14px;
  font-size: 11px; font-weight: 600; letter-spacing: .15em;
  text-transform: uppercase; cursor: pointer;
  color: var(--soft); background: transparent;
}
.lbl-tog.on { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }

/* ── PILLS ── */
.pill {
  font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
  font-weight: 700; padding: 3px 8px;
  border: 1px solid currentColor;
}
.pill.ontbijt { color: var(--ochre); }
.pill.lunch { color: var(--soft); }
.pill.avond { color: var(--espresso); }
.pill.hapje { color: var(--espresso); }
.pill.kind { color: var(--ochre); }
.lbl-tag {
  display: inline-block; font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; font-weight: 700; color: var(--ochre);
  border: 1px solid var(--ochre); padding: 2px 7px;
  margin: 4px 4px 0 0;
}
.badge-made {
  display: inline-block; font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; font-weight: 700; color: var(--soft);
  border: 1px solid var(--hairline); padding: 2px 7px;
}

/* ── SEARCH / CHIPS / TOOLBAR ── */
.searchbar { position: relative; padding: 0; margin-bottom: 0; border-bottom: 1px solid var(--hairline); }
.searchbar input {
  width: 100%; border: none;
  background: var(--alabaster);
  padding: 16px 24px 16px 52px;
  font-family: inherit; font-size: 14px;
  color: var(--espresso); outline: none;
  letter-spacing: .02em;
}
.searchbar svg { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); opacity: .4; }
.chips {
  display: flex; gap: 0; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid var(--hairline);
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto; border: none; border-right: 1px solid var(--hairline);
  background: var(--alabaster); color: var(--soft);
  padding: 11px 18px; font-size: 11px; font-weight: 600;
  letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
}
.chip.active { background: var(--espresso); color: var(--bone); }
.toolrow {
  display: flex; border-bottom: 1px solid var(--hairline);
}
.toolrow button {
  flex: 1; border: none; border-right: 1px solid var(--hairline);
  background: var(--alabaster); color: var(--espresso);
  padding: 14px 10px; font-family: inherit;
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
}
.toolrow button:last-child { border-right: none; }
.toolrow button:active { background: var(--hairline); }

/* ── CARD (Recepten) ── */
.card {
  border-bottom: 1px solid var(--hairline);
  padding: 20px 24px; cursor: pointer;
  background: var(--bone); position: relative;
  transition: background .1s;
}
.card:active { background: var(--alabaster); }
.card .tagrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; padding-right: 36px; }
.card h3 { font-size: 21px; font-weight: 400; line-height: 1.2; padding-right: 36px; margin-bottom: 4px; }
.card .meta { font-size: 12.5px; color: var(--soft); }
.heart {
  position: absolute; top: 18px; right: 20px;
  width: 30px; height: 30px; border: none;
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.heart svg { width: 20px; height: 20px; }

/* ── PICKER ── */
.pickopt {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 24px; border-bottom: 1px solid var(--hairline);
  cursor: pointer; background: var(--bone);
}
.pickopt:active { background: var(--alabaster); }
.pickopt .pt { font-size: 17px; font-weight: 400; flex: 1; }
.pickopt .ps { font-size: 12.5px; color: var(--soft); margin-top: 2px; }
.pickopt.special { background: var(--alabaster); }

/* ── FORM FIELDS ── */
.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 9px; font-weight: 700;
  letter-spacing: .38em; text-transform: uppercase;
  color: var(--ochre); margin-bottom: 8px;
}
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--hairline);
  background: var(--alabaster); padding: 13px 16px;
  font-family: inherit; font-size: 15px;
  color: var(--espresso); outline: none; border-radius: 0;
}
.field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--espresso); }
.field .hint { font-size: 12px; color: var(--soft); margin-top: 6px; line-height: 1.4; }

/* ── BUTTONS ── */
.btn {
  width: 100%; border: none;
  background: var(--espresso); color: var(--bone);
  padding: 16px 24px; font-family: inherit;
  font-size: 12px; font-weight: 700;
  letter-spacing: .3em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 10px;
  transition: opacity .15s; border-radius: 0;
}
.btn:active { opacity: .85; }
.btn.ghost {
  background: transparent; color: var(--espresso);
  border: 1px solid var(--espresso);
}
.btn.subtle {
  background: transparent; color: var(--soft);
  border: 1px solid var(--hairline);
  font-size: 11px;
}

/* ── SHOPPING ── */
.progress { font-size: 12px; color: var(--soft); margin-bottom: 8px; letter-spacing: .04em; }
.pbar { height: 2px; background: var(--hairline); margin: 0 0 24px; }
.pbar i { display: block; height: 100%; background: var(--ochre); transition: width .3s; }
.shoprow {
  display: flex; gap: 14px; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--hairline); cursor: pointer;
}
.shoprow:last-of-type { border-bottom: none; }
.shoprow .amt { font-weight: 600; min-width: 62px; font-variant-numeric: tabular-nums; font-size: 14px; }
.leftover-tag {
  display: inline-block; font-size: 9px; letter-spacing: .1em;
  text-transform: uppercase; font-weight: 700; color: var(--soft);
  border: 1px solid var(--hairline); padding: 2px 6px; margin-left: 8px;
}
.shoprow.lo .txt { color: var(--soft); }

/* ── MEALPREP ── */
.mprow {
  display: flex; gap: 14px; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--hairline); cursor: pointer;
}
.mprow:last-of-type { border-bottom: none; }
.mprow .tick { width: 18px; height: 18px; border: 1px solid var(--hairline); flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }

/* ── EMPTY ── */
.empty { text-align: center; color: var(--soft); padding: 60px 24px; }
.empty .big { font-size: 54px; font-weight: 300; color: var(--ochre); margin-bottom: 12px; letter-spacing: -.02em; }

/* ── INSTALL HINT ── */
.installhint {
  border-left: 2px solid var(--ochre);
  padding: 12px 16px; font-size: 13px; color: var(--soft);
  margin-bottom: 20px; line-height: 1.5;
  background: var(--alabaster); display: flex; gap: 10px;
}

/* ── CYCLE PICKER ── */
.cycle-active { border-left: 3px solid var(--ochre) !important; background: var(--alabaster) !important; }

/* ── WEEK SWITCHER CYCLE ── */
.cycle-pill {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--hairline);
  cursor: pointer; background: var(--bone);
}
.cycle-pill:active { background: var(--alabaster); }

/* ── NAV ── */
nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: var(--bone);
  border-top: 1px solid var(--hairline);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1; background: none; border: none; border-right: 1px solid var(--hairline);
  padding: 13px 0 14px; cursor: pointer; color: var(--faint);
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; font-family: inherit; transition: color .15s;
}
nav button:last-child { border-right: none; }
nav button .nlbl { font-size: 9px; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; }
nav button svg { width: 20px; height: 20px; }
nav button.active { color: var(--espresso); }

/* ── WATER BLOCK ── */
.water-card {
  padding: 20px 24px;
  border-bottom: 1px solid var(--hairline);
  background: var(--bone);
}
.water-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.water-count { font-size: 32px; font-weight: 300; letter-spacing: -.02em; }
.water-count span { font-size: 13px; color: var(--soft); font-weight: 400; letter-spacing: .02em; }
.water-btns { display: flex; gap: 1px; }
.water-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--hairline);
  background: transparent; color: var(--espresso);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.water-btn.plus { background: var(--espresso); color: var(--bone); border-color: var(--espresso); }
.water-btn:active { opacity: .75; }
.water-bar { height: 2px; background: var(--hairline); margin-bottom: 0; }
.water-fill { height: 100%; background: var(--ochre); transition: width .3s; }
.water-drops { display: none; } /* replaced by bar */
.drop { display: none; }
.drop.full { display: none; }

.bulk-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--hairline);cursor:pointer;transition:background .1s;}
.bulk-row.selected{background:var(--alabaster);}
.bulk-check{width:20px;height:20px;border:1px solid var(--hairline);flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;}
.bulk-check.on{background:var(--espresso);border-color:var(--espresso);}
.bulk-check.on::after{content:"\2713";color:var(--bone);font-size:13px;font-weight:700;}
.bulk-title{font-size:16px;font-weight:400;margin-bottom:2px;}
.bulk-sub{font-size:12px;color:var(--soft);letter-spacing:.04em;}
</style>
</head>

function getAutoPhase(){
  if(!cycleData.startDate) return null;
  var start=new Date(cycleData.startDate);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.round((today-start)/(1000*60*60*24));
  var cLen=cycleData.cycleLen||28;
  var dayInCycle=((diff%cLen)+cLen)%cLen+1;
  var pLen=cycleData.periodLen||5;
  if(dayInCycle<=pLen) return "menstruatie";
  if(dayInCycle<=Math.round(cLen*0.46)) return "folliculair";
  if(dayInCycle<=Math.round(cLen*0.57)) return "ovulatie";
  return "luteaal";
}

  if(!cycleData.startDate) return null;
  var start=new Date(cycleData.startDate);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.round((today-start)/(1000*60*60*24));
  var cLen=cycleData.cycleLen||28;
  return ((diff%cLen)+cLen)%cLen+1;
}

function ingToText(ing){
  return (ing||[]).map(function(x){return (x.a!=null?x.a+(x.u?' '+x.u:'')+" ":"")+x.it;}).join("\n");
}
function parseIng(line){
  line=line.trim();if(!line)return null;
  var m=line.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-Z]+)?\s+(.+)$/);
  var units=["g","kg","ml","l","el","tl","tsp","tbsp","cup","stuks","blik","blikken","teen","tenen","bol"];
  if(m){
    var a=parseFloat(m[1].replace(",",".")),u="",it;
    if(m[2]&&units.indexOf(m[2].toLowerCase())>=0){u=m[2].toLowerCase();it=m[3];}
    else{it=(m[2]?m[2]+" ":"")+m[3];}
    return {a:a,u:u,it:it};
  }
  return {a:null,u:"",it:line};
}

function bulkToggle(id){
  if(window._bulkSel.has(id))window._bulkSel.delete(id);
  else window._bulkSel.add(id);
  var chk=document.getElementById("bchk_"+id);
  var row=document.getElementById("brow_"+id);
  if(chk){chk.classList.toggle("on",window._bulkSel.has(id));}
  if(row){row.classList.toggle("selected",window._bulkSel.has(id));}
  var act=document.getElementById("bulkActions");
  if(act)act.style.display=window._bulkSel.size>0?"block":"none";
  var btn=act?act.querySelector("button"):null;
  if(btn)btn.textContent="Verwijder "+window._bulkSel.size+" recept"+(window._bulkSel.size===1?"":"en")+" →";
}
function bulkSelectAll(){
  var rows=document.querySelectorAll(".bulk-row");
  var allSelected=window._bulkSel.size===rows.length;
  window._bulkSel=new Set();
  if(!allSelected)rows.forEach(function(row){var id=row.id.replace("brow_","");window._bulkSel.add(id);});
  rows.forEach(function(row){
    var id=row.id.replace("brow_","");
    var chk=document.getElementById("bchk_"+id);
    if(chk)chk.classList.toggle("on",window._bulkSel.has(id));
    row.classList.toggle("selected",window._bulkSel.has(id));
  });
  var act=document.getElementById("bulkActions");
  if(act)act.style.display=window._bulkSel.size>0?"block":"none";
  var btn=act?act.querySelector("button"):null;
  if(btn)btn.textContent="Verwijder "+window._bulkSel.size+" recept"+(window._bulkSel.size===1?"":"en")+" →";
}
function bulkDeleteConfirm(){
  var n=window._bulkSel.size;
  if(!n)return;
  if(!confirm(n+" recept"+(n===1?" ":"en ")+"definitief verwijderen?"))return;
  window._bulkSel.forEach(function(id){
    // Custom recipes: remove from array
    var ci=custom.findIndex(function(r){return r.id===id;});
    if(ci>=0)custom.splice(ci,1);
    // All: mark as deleted in meta
    var m=meta[id]||(meta[id]={});m.deleted=true;
  });
  save("fp_custom",custom);save("fp_meta",meta);
  window._bulkSel=new Set();
  closeSheet();renderRecepten();
}

// ── LIJST ──
function buildList(){
  var map={},staples={};
  activePlan().meals.forEach(function(day){
    MEALS.forEach(function(m){
      var id=day[m];
      if(!id||id==="nvt")return;
      var r=recipeById(id);if(!r)return;
      (r.ing||[]).forEach(function(x){
        if(x.a==null){staples[x.it.toLowerCase()]=x.it;return;}
        var k=x.it.toLowerCase()+"|"+x.u;
        if(!map[k])map[k]={it:x.it,u:x.u,a:0,lo:false};
        map[k].a+=x.a;
        if(leftovers[x.it.toLowerCase()])map[k].lo=true;
      });
    });
  });
  var toBuy=Object.values(map).map(function(o){
    var a=(o.u==="g"||o.u==="ml")?(o.a>=20?Math.round(o.a/5)*5:Math.round(o.a)):Math.round(o.a*10)/10;
    return {txt:o.it,amt:a,unit:o.u,lo:o.lo||false};
  });
  toBuy.sort(function(a,b){return a.txt.localeCompare(b.txt);});
  return {toBuy:toBuy,staples:Object.values(staples).sort()};
}

      +'<button class="btn ghost" onclick="go(\'week\')">Naar de week &#8250;</button>';

    var amt='<span class="amt">'+((""+o.amt).replace(".",","))+(o.unit?" "+o.unit:"")+'</span>';
    h+='<div class="shoprow '+d+'" onclick="toggleL(this,\''+esc(key).replace(/'/g,"\\'")+'\')">'
      +'<div class="tick">'+checkSvg+'</div>'+amt+'<div class="txt">'+esc(o.txt)+'</div></div>';
  });
  if(L.staples.length){
    h+='<div class="subhead">Check je voorraad</div>';

      var key="s|"+s,d=listChecks[key]?"done":"";

    });

  h+='<button class="btn subtle" style="margin-top:16px" onclick="resetL()">Vinkjes wissen</button>';

function updListBar(){
  var L=buildList(),all=L.toBuy.length+L.staples.length,done=0;
  L.toBuy.forEach(function(o){if(listChecks["b|"+o.txt])done++;});
  L.staples.forEach(function(s){if(listChecks["s|"+s])done++;});
  var pct=all?Math.round(done/all*100):0;
  var pr=document.querySelector("#v-lijst .progress");
  var bar=document.getElementById("pbarI");
  if(pr)pr.innerHTML=done+" van "+all+" &middot; "+pct+"%";
  if(bar)bar.style.width=pct+"%";
}
function toggleL(el,key){
  el.classList.toggle("done");
  listChecks[key]=el.classList.contains("done");
  if(!listChecks[key])delete listChecks[key];
  save("fp_list",listChecks);updListBar();
}
function resetL(){listChecks={};save("fp_list",listChecks);renderLijst();}
function copyList(){
  var L=buildList(),t="Boodschappen\n\n";
  L.toBuy.forEach(function(o){t+="- "+((""+o.amt).replace(".",","))+(o.unit?" "+o.unit:"")+" "+o.txt+"\n";});
  if(L.staples.length){t+="\nCheck voorraad:\n";L.staples.forEach(function(s){t+="- "+s+"\n";});}
  copyText(t,"Lijst gekopieerd! Plak \u2019m in Notes, Bring of WhatsApp.");
}

// ── SHEET / NAV ──
function openSheet(){document.getElementById("sheet").classList.add("on");document.body.style.overflow="hidden";}
function closeSheet(){document.getElementById("sheet").classList.remove("on");document.body.style.overflow="";}
var TABS={vandaag:{t:"Plan"},week:{t:"Week"},recepten:{t:"Recepten"},lijst:{t:"Boodschappen"}};
function go(tab){
  if(tab==="vandaag")renderVandaag();
  if(tab==="week")renderWeek();
  if(tab==="recepten")renderRecepten();
  if(tab==="lijst")renderLijst();
  document.querySelectorAll(".view").forEach(function(v){v.classList.remove("on");});
  document.getElementById("v-"+tab).classList.add("on");
  document.querySelectorAll("nav button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab);});
  document.getElementById("htitle").textContent=TABS[tab].t;
  window.scrollTo(0,0);
}
document.querySelectorAll("nav button").forEach(function(b){b.onclick=function(){go(b.dataset.tab);};});
go("vandaag");
function toggleLeftover(id){leftovers[id]=!leftovers[id];if(!leftovers[id])delete leftovers[id];save('fp_leftovers',leftovers);}

</script>
